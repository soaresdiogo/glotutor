name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Everything from pre-commit ───────────────────────────
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (lint-staged equivalent - full project)
        run: npm run lint

      - name: Lint Sonar
        run: npm run lint:sonar

  # ─── Job 2: Everything from pre-push ────────────────────────────
  validate:
    name: ✅ Type Check, Cycles, Copy & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check-types

      - name: Check circular dependencies
        run: npm run check-cycles

      - name: Validate copy
        run: npm run validate-copy

      - name: Run tests
        run: npm run test

  # ─── Job 3: Migration - only runs on main if everything passes ───
  # Connects via SSH to the VPS and runs migrations inside the Docker container
  # DATABASE_URL is already available inside the container via Coolify
  migrate:
    name: 🗄️ Run Database Migrations
    runs-on: ubuntu-latest
    needs: [lint, validate]                        # depends on both previous jobs
    if: github.ref == 'refs/heads/main'            # only on main branch

    steps:
      - name: Decode SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 --decode > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
      - name: Check runner IP
        run: |
          echo "Runner outbound IP (add to VPS firewall if needed):"
          curl -s https://api.ipify.org
          echo ""
          echo "Note: GitHub Actions IPs can change; consider whitelisting GitHub's IP range."

      # #region agent log — diagnostics for VPS timeout (hypotheses A–E)
      - name: Diagnose — TCP reachability to VPS (port 22)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "Testing TCP connection to VPS_HOST:22 (timeout 15s)..."
          if timeout 15 bash -c "cat < /dev/null > /dev/tcp/$VPS_HOST/22" 2>/dev/null; then
            echo "TCP_OK: Port 22 reachable."
          else
            echo "TCP_FAIL: Cannot reach port 22 (firewall/network/VPS down?). Exit: $?"
          fi
      # #endregion

      # #region agent log — SSH verbose to capture timeout vs auth error
      - name: Diagnose — SSH first connection (verbose, 15s timeout)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -v -o ConnectTimeout=15 -o StrictHostKeyChecking=no -i /tmp/ssh_key "$VPS_USER@$VPS_HOST" "echo SSH_OK" 2>&1 || true
      # #endregion

      - name: Run migrations via SSH inside Docker container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /tmp/ssh_key
          script: |
            docker exec n48ocog800sksw0co4kssoow-093458758872 npx drizzle-kit migrate
