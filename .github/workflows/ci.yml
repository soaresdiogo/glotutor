name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: Everything from pre-commit ───────────────────────────
  lint:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (lint-staged equivalent - full project)
        run: npm run lint

      - name: Lint Sonar
        run: npm run lint:sonar

  # ─── Job 2: Everything from pre-push ────────────────────────────
  validate:
    name: ✅ Type Check, Cycles, Copy & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check-types

      - name: Check circular dependencies
        run: npm run check-cycles

      - name: Validate copy
        run: npm run validate-copy

      - name: Run tests
        run: npm run test

  # Migrations run at container startup (see package.json "start": migrate && next start).
  # Coolify deploys on push to main; the new container runs migrations before Next.js starts.
